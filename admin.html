<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админка — CorpseClient</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=20260525" />
    <style>
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      .admin-redirect-card {
        max-width: 440px;
        width: 100%;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg, 18px);
        padding: 2rem;
        box-shadow: var(--shadow-card);
        text-align: center;
      }
      .admin-redirect-card h1 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
      }
      .admin-redirect-card p {
        color: var(--muted);
        margin: 0 0 1rem;
        line-height: 1.5;
      }
      .admin-creds {
        text-align: left;
        background: color-mix(in srgb, var(--bg) 70%, var(--card));
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 1rem 1.1rem;
        margin: 1rem 0;
        font-size: 0.9rem;
      }
      .admin-creds dt {
        color: var(--muted);
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-top: 0.65rem;
      }
      .admin-creds dt:first-child {
        margin-top: 0;
      }
      .admin-creds dd {
        margin: 0.2rem 0 0;
        font-family: ui-monospace, Consolas, monospace;
        color: var(--text);
        word-break: break-all;
      }
    </style>
    <script>
      setTimeout(function () {
        window.location.replace("http://localhost:5173");
      }, 1200);
    </script>
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow" aria-hidden="true"></div>
    <article class="admin-redirect-card">
      <h1>CorpseClient Admin</h1>
      <p>Перенаправление на панель…</p>
      <dl class="admin-creds">
        <dt>URL</dt>
        <dd><a href="http://localhost:5173">http://localhost:5173</a></dd>
        <dt>Email</dt>
        <dd>admin@inprotect.local</dd>
        <dt>Пароль</dt>
        <dd>admin12345</dd>
      </dl>
      <a class="btn btn-primary" href="http://localhost:5173">Открыть админку</a>
    </article>
  </body>
</html>
