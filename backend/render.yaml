services:
  - type: web
    name: corpseclient-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://genakulagin627-beep.github.io
      - key: ADMIN_EMAIL
        value: admin@inprotect.local
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_NAME
        value: Admin
