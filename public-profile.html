<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Профиль — CorpseClient</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="inprotect-api-base" content="" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=20260525" />
    <link rel="stylesheet" href="account.css?v=20260525" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow" aria-hidden="true"></div>

    <header class="site-header">
      <a class="logo" href="chat.html">
        <span class="logo-mark" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
            ><path d="M12 3L4 7v6c0 4.5 3 8.5 8 10 5-1.5 8-5.5 8-10V7l-8-4z" stroke="currentColor" stroke-width="1.75"/></svg>
        </span>
        <span class="logo-text">CorpseClient</span>
      </a>
      <div class="header-actions">
        <a class="btn btn-ghost btn-sm" href="chat.html">Назад в чат</a>
      </div>
    </header>

    <main class="profile-page">
      <div class="profile-grid" style="max-width: 720px">
        <aside class="profile-sidebar">
          <div class="profile-card">
            <div class="profile-user-row">
              <div class="profile-avatar" aria-label="Аватар">
                <img id="avatar-img" class="profile-avatar-img hidden" alt="Аватар" />
                <div id="avatar-letter">?</div>
              </div>
              <div>
                <div class="profile-name" id="profile-name">—</div>
                <div class="profile-role-badge" id="profile-role">—</div>
              </div>
            </div>
            <div style="color: var(--muted); font-size: 0.85rem" id="profile-uid">—</div>
          </div>
        </aside>
      </div>
    </main>

    <footer class="site-footer-mega js-mega-footer" id="mega-footer"></footer>

    <script src="auth-core.js?v=20260525"></script>
    <script src="footer-mega.js?v=20260525"></script>
    <script src="theme-runtime.js?v=20260525"></script>
    <script src="public-profile.js?v=20260525"></script>
  </body>
</html>
