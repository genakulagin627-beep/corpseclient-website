      <div class="header-actions">

        <div class="chat-compose">
          <textarea id="chat-text" class="chat-textarea" placeholder="Сообщение… (Enter — отправить, Shift+Enter — перенос)"></textarea>
          <button class="btn-sm-pri" id="chat-send" type="button">Отправить</button>
